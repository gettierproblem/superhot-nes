<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SUPERHOT DEMAKE - NES</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0f0f0f;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
h1 { font-size: 1.5em; margin-bottom: 0.5em; color: #e44; }
canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 512px;
    height: 480px;
    border: 2px solid #333;
    background: #000;
}
.controls {
    margin-top: 1em;
    font-size: 0.85em;
    color: #888;
    text-align: center;
    line-height: 1.8;
}
.controls kbd {
    background: #333;
    padding: 2px 6px;
    border-radius: 3px;
    color: #fff;
}
#loading {
    color: #e44;
    font-size: 1.2em;
    margin-bottom: 1em;
}
</style>
</head>
<body>
<h1>SUPERHOT DEMAKE</h1>
<div id="loading">Loading ROM...</div>
<canvas id="nes-canvas" width="256" height="240"></canvas>
<div class="controls">
    <kbd>Arrow Keys</kbd> Move / Crouch
    &nbsp;
    <kbd>Z</kbd> Jump (A)
    &nbsp;
    <kbd>X</kbd> Attack / Throw (B)
    &nbsp;
    <kbd>Enter</kbd> Start
    <br>
    Time only moves when you move.
    Crouch over weapons to pick up. Down+Jump drops through platforms.
</div>

<script>
var JSNES_SCRIPT = "https://unpkg.com/jsnes@2.0.0/dist/jsnes.min.js";

function loadScript(src, cb) {
    var s = document.createElement("script");
    s.src = src;
    s.onload = cb;
    document.head.appendChild(s);
}

loadScript(JSNES_SCRIPT, function() {
    var canvas = document.getElementById("nes-canvas");
    var ctx = canvas.getContext("2d");
    var imageData = ctx.createImageData(256, 240);

    var framebuffer_u8, framebuffer_u32;

    var AUDIO_BUFFERING = 512;
    var SAMPLE_COUNT = 4 * 1024;
    var SAMPLE_MASK = SAMPLE_COUNT - 1;
    var audioCtx, scriptNode;
    var audioSamples = new Float32Array(SAMPLE_COUNT);
    var audioWritePos = 0;
    var audioReadPos = 0;

    function audioInit() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            scriptNode = audioCtx.createScriptProcessor(1024, 0, 1);
            scriptNode.onaudioprocess = audioProcess;
            scriptNode.connect(audioCtx.destination);
        } catch (e) {}
    }

    function audioProcess(e) {
        var out = e.outputBuffer.getChannelData(0);
        for (var i = 0; i < out.length; i++) {
            out[i] = audioSamples[audioReadPos];
            audioReadPos = (audioReadPos + 1) & SAMPLE_MASK;
        }
    }

    function audioSample(l, r) {
        audioSamples[audioWritePos] = (l + r) * 0.5;
        audioWritePos = (audioWritePos + 1) & SAMPLE_MASK;
    }

    var nes = new jsnes.NES({
        onFrame: function(fb) {
            var i = 0, p = 0;
            for (i = 0; i < 256 * 240; i++) {
                framebuffer_u32[i] = 0xFF000000 | fb[i];
            }
            imageData.data.set(framebuffer_u8);
            ctx.putImageData(imageData, 0, 0);
        },
        onAudioSample: audioSample,
        sampleRate: 44100
    });

    var buf = new ArrayBuffer(imageData.data.length);
    framebuffer_u8 = new Uint8Array(buf);
    framebuffer_u32 = new Uint32Array(buf);

    /* Key mapping */
    var KEY_MAP = {
        38: [1, jsnes.Controller.BUTTON_UP],     /* Up */
        40: [1, jsnes.Controller.BUTTON_DOWN],    /* Down */
        37: [1, jsnes.Controller.BUTTON_LEFT],    /* Left */
        39: [1, jsnes.Controller.BUTTON_RIGHT],   /* Right */
        90: [1, jsnes.Controller.BUTTON_A],        /* Z = A */
        88: [1, jsnes.Controller.BUTTON_B],        /* X = B */
        13: [1, jsnes.Controller.BUTTON_START],    /* Enter = Start */
        16: [1, jsnes.Controller.BUTTON_SELECT]    /* Shift = Select */
    };

    document.addEventListener("keydown", function(e) {
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        var m = KEY_MAP[e.keyCode];
        if (m) { nes.buttonDown(m[0], m[1]); e.preventDefault(); }
    });
    document.addEventListener("keyup", function(e) {
        var m = KEY_MAP[e.keyCode];
        if (m) { nes.buttonUp(m[0], m[1]); e.preventDefault(); }
    });

    /* Animation loop — locked to 60fps */
    var frameTime = 1000 / 60;
    var lastFrame = 0;
    function frame(ts) {
        requestAnimationFrame(frame);
        if (ts - lastFrame < frameTime) return;
        lastFrame = ts - ((ts - lastFrame) % frameTime);
        nes.frame();
    }

    /* Load the ROM */
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "superhotdemake.nes", true);
    xhr.responseType = "arraybuffer";
    xhr.onload = function() {
        if (xhr.status === 200) {
            var data = new Uint8Array(xhr.response);
            var romStr = "";
            for (var i = 0; i < data.length; i++) {
                romStr += String.fromCharCode(data[i]);
            }
            nes.loadROM(romStr);
            audioInit();
            document.getElementById("loading").style.display = "none";
            requestAnimationFrame(frame);
        }
    };
    xhr.onerror = function() {
        document.getElementById("loading").textContent = "Failed to load ROM.";
    };
    xhr.send();
});
</script>
</body>
</html>
