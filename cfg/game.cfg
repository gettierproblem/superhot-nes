MEMORY {
    ZP:      start = $00,    size = $100,  type = rw, define = yes;
    OAM:     start = $0200,  size = $100,  type = rw, define = yes;
    RAM:     start = $0300,  size = $0500, type = rw, define = yes;
    HDR:     start = $0000,  size = $0010, file = %O, fill = yes;
    ROM0:    start = $8000,  size = $8000, file = %O, fill = yes, define = yes;
    CHRROM:  start = $0000,  size = $2000, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE:    load = ZP,     type = zp;
    OAM:         load = OAM,    type = bss, optional = yes;
    BSS:         load = RAM,    type = bss, define = yes;
    HEADER:      load = HDR,    type = ro;
    STARTUP:     load = ROM0,   type = ro,  define = yes;
    LOWCODE:     load = ROM0,   type = ro,  optional = yes;
    CODE:        load = ROM0,   type = ro,  define = yes;
    RODATA:      load = ROM0,   type = ro,  define = yes;
    DATA:        load = ROM0,   run = RAM,  type = rw, define = yes;
    ONCE:        load = ROM0,   type = ro,  optional = yes;
    INIT:        load = ROM0,   type = ro,  optional = yes, define = yes;
    VECTORS:     load = ROM0,   type = ro,  start = $FFFA;
    CHARS:       load = CHRROM, type = ro,  optional = yes;
}

SYMBOLS {
    NES_MAPPER:     type = export, value = 0;
    NES_PRG_BANKS:  type = export, value = 2;
    NES_CHR_BANKS:  type = export, value = 1;
    NES_MIRRORING:  type = export, value = 1;

    __CONSTRUCTOR_TABLE__: type = export, value = 0;
    __CONSTRUCTOR_COUNT__: type = export, value = 0;
    __DESTRUCTOR_TABLE__:  type = export, value = 0;
    __DESTRUCTOR_COUNT__:  type = export, value = 0;
}
